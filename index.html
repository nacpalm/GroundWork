<title>Groundwork</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── LIGHT DEFAULT ── */
:root{
  --bg:#f2f1ed;--bg2:#ffffff;--bg3:#eae9e4;--bg4:#dddcd6;--bg5:#cfcec8;
  --border:#dddcd6;--border2:#c8c7c0;
  --text:#0d0d0d;--text2:#3a3a3a;--text3:#787878;
  --accent:#0d0d0d;--accent-bg:rgba(0,0,0,.06);
  --hi:#d4ff00;--hi-text:#ffffff;
  --green:#15803d;--green-bg:rgba(21,128,61,.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --blue:#1d4ed8;--orange:#c2410c;
  --r:16px;--r-sm:10px;--r-xs:7px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
/* ── DARK HIGH CONTRAST ── */
[data-theme=dark]{
  --bg:#080808;--bg2:#111111;--bg3:#1e1e1e;--bg4:#2a2a2a;--bg5:#363636;
  --border:#2a2a2a;--border2:#3e3e3e;
  --text:#f8f8f8;--text2:#cccccc;--text3:#888888;
  --accent:#e8ff47;--accent-bg:rgba(232,255,71,.1);
  --hi:#e8ff47;--hi-text:#080808;
  --green:#4ade80;--green-bg:rgba(74,222,128,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --blue:#93c5fd;--orange:#fdba74;
}
/* dark input fields — high contrast */
[data-theme=dark] input,[data-theme=dark] select,[data-theme=dark] textarea{
  background:#262626 !important;border-color:#4a4a4a !important;color:#f8f8f8 !important;
}
[data-theme=dark] input::placeholder{color:#666 !important;}
[data-theme=dark] input:focus,[data-theme=dark] select:focus{border-color:#e8ff47 !important;background:#2e2e2e !important;}
[data-theme=dark] .set-inp{background:#252525 !important;border-color:#484848 !important;color:#f0f0f0 !important;}
[data-theme=dark] .set-inp:focus{border-color:#e8ff47 !important;background:#2e2e2e !important;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
button{font-family:'Barlow',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:'Barlow',sans-serif;color:var(--text);}
input[type=number]::-webkit-inner-spin-button{opacity:.5;}
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + var(--sb) + 20px);}
.screen.active{display:block;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + var(--sb));padding-bottom:var(--sb);
  background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--text3);transition:color .15s;padding-bottom:2px;}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-item span{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}

/* HEADER */
.page-header{padding:calc(var(--st) + 16px) 20px 12px;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.page-header h1{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.ph-row{display:flex;justify-content:space-between;align-items:center;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text2);}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;}

/* WEEK STRIP */
.week-strip{padding:14px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;width:46px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;border-radius:var(--r-sm);border:1px solid transparent;transition:all .2s;}
.day-pill.has-workout{border-color:var(--border2);background:var(--bg3);}
.day-pill.today{border-color:var(--accent);background:var(--accent-bg);}
.day-pill.today .dp-name,.day-pill.today .dp-num{color:var(--accent);}
.day-pill.rest{opacity:.35;}
.dp-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);}
.dp-num{font-size:18px;font-weight:700;color:var(--text2);line-height:1;}
.dp-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}

/* TODAY */
.today-section{padding:16px;}
.day-label-sm{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.workout-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;text-transform:uppercase;line-height:1;}
.workout-focus{font-size:13px;color:var(--blue);font-weight:600;margin-top:5px;margin-bottom:16px;}
[data-theme=dark] .workout-focus{color:var(--accent);}

/* EXERCISE CARD */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.ex-card-hd{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.ex-card-hd-l{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-muscle-tag{font-size:11px;color:var(--text3);margin-top:1px;}
.ex-card-hd-r{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px;}
.ex-unit-tog{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);overflow:hidden;}
.eu-opt{padding:4px 9px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;}
.eu-opt.active{background:var(--accent);color:var(--hi-text);}
.swap-btn{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);}
.swap-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.ex-prev{padding:6px 14px 0;font-size:11px;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap;}
.ex-prev .lw{color:var(--text2);font-weight:600;}
.ex-prev .pr{color:var(--green);font-weight:700;}

/* SET ROWS */
.sets-hd{display:grid;grid-template-columns:26px 1fr 1fr 34px 26px;gap:6px;padding:7px 14px 3px;align-items:center;}
.sets-hd span{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.sets-hd span:first-child{text-align:left;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 34px 26px;gap:6px;padding:4px 14px;align-items:center;transition:background .1s;}
.set-row.done-row{background:var(--green-bg);}
.set-num{font-size:12px;font-weight:700;color:var(--text3);text-align:center;}
.set-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);padding:8px 4px;font-size:15px;font-weight:600;width:100%;text-align:center;outline:none;transition:border-color .15s;}
.set-inp:focus{border-color:var(--accent);}
.set-row.done-row .set-inp{color:var(--green);background:transparent;border-color:transparent;}
.chk-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;flex-shrink:0;}
.chk-btn.done{background:var(--green);border-color:var(--green);color:#fff;}
.chk-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.del-set-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;flex-shrink:0;}
.add-set-wrap{padding:8px 14px 12px;}
.add-set-btn{width:100%;padding:9px;background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--r-xs);font-size:13px;font-weight:600;color:var(--text3);}

/* BUTTONS */
.btn-primary{display:block;width:calc(100% - 32px);margin:4px 16px;padding:15px;
  background:var(--accent);color:var(--hi-text);border-radius:var(--r);
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:opacity .1s;}
.btn-primary:active{opacity:.85;}
.btn-ghost{display:block;width:calc(100% - 32px);margin:6px 16px;padding:13px;
  background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-weight:600;}

/* REST DAY */
.rest-hero{padding:32px 20px 20px;text-align:center;}
.rest-icon{font-size:52px;margin-bottom:10px;}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--text2);text-transform:uppercase;}
.rest-sub{font-size:13px;color:var(--text3);margin-top:4px;}
.next-card{margin:0 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.next-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px;}
.next-day{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;text-transform:uppercase;}
.next-focus{font-size:13px;color:var(--text3);margin-top:2px;}

/* HISTORY */
.hist-wrap{position:relative;margin:0 16px 10px;overflow:hidden;border-radius:var(--r);}
.del-bg{position:absolute;inset:0;background:var(--red-bg);border:1px solid var(--red);border-radius:var(--r);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:var(--red);font-size:13px;font-weight:700;gap:6px;}
.del-bg svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.hist-entry{margin:0;transform:translateX(0);transition:transform .2s;position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;}
.hist-entry.swiping{transition:none;}
.he-top{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.he-date{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.he-day{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;margin-top:2px;}
.he-focus{font-size:12px;color:var(--text2);margin-top:1px;}
.badge{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;}
.badge-legs{background:#dcfce7;color:#15803d;}
.badge-chest{background:#dbeafe;color:#1d4ed8;}
.badge-back{background:#ffedd5;color:#c2410c;}
[data-theme=dark] .badge-legs{background:#14532d;color:#4ade80;}
[data-theme=dark] .badge-chest{background:#1e3a5f;color:#93c5fd;}
[data-theme=dark] .badge-back{background:#431407;color:#fdba74;}
.he-stats{display:flex;border-top:1px solid var(--border);}
.he-stat{flex:1;padding:9px 10px;border-right:1px solid var(--border);text-align:center;}
.he-stat:last-child{border-right:none;}
.he-stat-v{font-size:14px;font-weight:700;}
.he-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px;}

/* PROGRESS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;}
.stat-v{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:3px;}
.vol-breakdown{margin:10px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.vb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
.vb-row:last-child{border-bottom:none;}
.vb-label{font-size:13px;font-weight:600;}
.vb-vals{display:flex;gap:16px;}
.vb-val{text-align:right;}
.vb-num{font-size:14px;font-weight:700;color:var(--accent);}
[data-theme=light] .vb-num{color:var(--blue);}
.vb-sub{font-size:10px;color:var(--text3);text-transform:uppercase;}
.delta-card{margin:12px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.delta-hd{padding:12px 16px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.delta-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.delta-cell{padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.delta-cell:nth-child(2n){border-right:none;}
.delta-cell:nth-last-child(-n+2){border-bottom:none;}
.delta-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.delta-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.delta-cur{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;}
.diff-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
.diff-up{background:var(--green-bg);color:var(--green);}
.diff-dn{background:var(--red-bg);color:var(--red);}
.diff-flat{background:var(--bg3);color:var(--text3);}
.chart-card{margin:12px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;overflow:hidden;}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:2px;}
.chart-card p{font-size:11px;color:var(--text3);margin-bottom:10px;}
.ex-picker-wrap{position:relative;margin-bottom:10px;}
.ex-picker{width:100%;padding:10px 36px 10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:14px;color:var(--text);outline:none;appearance:none;}
.ex-picker-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);}
.ex-picker-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
canvas{width:100%!important;}
.section-hd{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:16px 16px 8px;}

/* PR SECTION */
.pr-filters{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap;}
.pr-search{flex:1;min-width:140px;position:relative;}
.pr-search input{width:100%;padding:8px 12px 8px 32px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:13px;outline:none;}
.pr-search input:focus{border-color:var(--accent);}
.pr-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;}
.pr-day-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.pr-day-chips::-webkit-scrollbar{display:none;}
.pr-chip{flex-shrink:0;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pr-chip.active{background:var(--accent);color:var(--hi-text);}
.pr-list{margin:0 16px;}
.pr-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.pr-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);}
.pr-item:last-child{border-bottom:none;}
.pr-name{font-size:14px;font-weight:600;}
.pr-muscle{font-size:11px;color:var(--text3);margin-top:1px;}
.pr-right{text-align:right;}
.pr-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--green);}
.pr-sub{font-size:11px;color:var(--text3);}

/* BANK */
.search-wrap{position:relative;margin:12px 16px 0;}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;}
.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;}
.chip.active{background:var(--accent);color:var(--hi-text);}
.bank-list{margin:10px 16px 0;}
.bank-grp-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:10px 4px 6px;}
.bank-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.bank-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.bank-item:last-child{border-bottom:none;}
.bank-item:active{background:var(--bg3);}
.bi-name{font-size:14px;font-weight:600;}
.bi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.bi-sim{color:var(--blue);font-weight:600;}
[data-theme=dark] .bi-sim{color:var(--blue);}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--sb) + 16px);right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--hi-text);display:flex;align-items:center;justify-content:center;z-index:150;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:26px;transition:transform .1s;}
.fab:active{transform:scale(.92);}

/* SETTINGS */
.settings-sec{margin:16px 16px 0;}
.settings-sec h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;padding:0 2px;}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-lbl{font-size:15px;font-weight:500;}
.setting-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.unit-seg{display:flex;background:var(--bg3);border-radius:var(--r-xs);overflow:hidden;border:1px solid var(--border2);}
.unit-opt{padding:7px 16px;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;}
.unit-opt.active{background:var(--accent);color:var(--hi-text);}
.sw-label{position:relative;width:48px;height:28px;cursor:pointer;display:block;}
.sw-label input{opacity:0;width:0;height:0;position:absolute;}
.sw-track{position:absolute;inset:0;background:var(--bg4);border-radius:14px;transition:.25s;}
.sw-thumb{position:absolute;left:3px;top:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.sw-label input:checked~.sw-track{background:var(--accent);}
.sw-label input:checked~.sw-thumb{transform:translateX(20px);}
.bw-inp-row{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
.bw-inp-row input{flex:1;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:15px;outline:none;}
.bw-log-btn{padding:10px 18px;background:var(--accent);color:var(--hi-text);border-radius:var(--r-xs);font-size:14px;font-weight:700;}
.bw-hist-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.bw-hist-row:last-child{border-bottom:none;}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:flex-end;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(var(--sb) + 20px);animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:10px auto 0;}
.sheet-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;padding:14px 20px;border-bottom:1px solid var(--border);}
.sheet-body{padding:18px 20px;}
.field-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:6px;}
.field-inp{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:15px;outline:none;margin-bottom:14px;}
.field-inp:focus{border-color:var(--accent);}
.field-sel{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:15px;color:var(--text);outline:none;margin-bottom:14px;appearance:none;}
.sheet-btn{width:100%;padding:15px;background:var(--accent);color:var(--hi-text);border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.sheet-cancel{width:100%;padding:12px;color:var(--text3);font-size:14px;font-weight:600;margin-top:6px;}
.sheet-del{width:100%;padding:13px;background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:var(--r);font-size:15px;font-weight:700;margin-top:8px;}
.detail-ex{padding:12px 20px;border-bottom:1px solid var(--border);}
.detail-ex-name{font-size:15px;font-weight:700;margin-bottom:8px;}
.detail-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:4px 12px;}
.dg-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);}
.dg-cell{font-size:14px;font-weight:600;color:var(--text2);}
.dg-cell.hi{color:var(--green);font-weight:700;}

/* SWAP SHEET */
.swap-item{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.swap-item:last-child{border-bottom:none;}
.swap-item:active{background:var(--bg3);}
.swap-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0;}
.swap-tag-sug{background:var(--green-bg);color:var(--green);}
.swap-tag-bank{background:var(--bg3);color:var(--text3);}

/* AFB */
.afb-item{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.afb-item:last-child{border-bottom:none;}
.afb-item:active{background:var(--bg3);}
.afb-add{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;}

.empty-state{padding:44px 20px;text-align:center;color:var(--text3);}
.empty-state svg{width:36px;height:36px;stroke:currentColor;fill:none;stroke-width:1.5;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}
.empty-state p{font-size:14px;}

const getBank     = () => JSON.parse(localStorage.getItem('il_bank')||'null') || DEFAULT_BANK;
const saveBank    = b  => localStorage.setItem('il_bank', JSON.stringify(b));
const getWorkouts = () => JSON.parse(localStorage.getItem('il_workouts')||'[]');

const saveBW      = b  => localStorage.setItem('il_bw', JSON.stringify(b));

// ── UNIT CONVERSION ───────────────────────────────────────────────────
function roundTo(val, step){ return Math.round(val / step) * step; }
function convert(val, from, to){
  const v = parseFloat(val)||0; if(!v) return '';
  if(from===to) return v;
  const raw = from==='kg' ? v*2.20462 : v*0.453592;
  return from==='kg' ? roundTo(raw, 5) : roundTo(raw, 2.5);
}
function toDefault(val, fromUnit){
  const v=parseFloat(val)||0; if(!v) return 0;
  return fromUnit===S.unit ? v : parseFloat(convert(v, fromUnit, S.unit))||0;
}

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtDate(iso){ return (iso?new Date(iso):new Date()).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDay(iso){  return (iso?new Date(iso):new Date()).toLocaleDateString('en-US',{weekday:'long'}); }
function dow(){ return new Date().getDay(); }
function weekStart(off=0){ const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+off*7);return d; }
function badgeClass(tag){ return tag==='legs'?'badge-legs':tag==='back'?'badge-back':'badge-chest'; }
function tagLabel(tag){ return tag==='legs'?'Legs':tag==='back'?'Back':'Push'; }
function fmtVol(v){ return v.toLocaleString('en-US',{maximumFractionDigits:0}); }

function getMuscleForEx(exName){
  const bk=getBank(); const e=bk.find(b=>b.name===exName); return e?e.muscle:'';
}

// ── LAST WEEK + PR ────────────────────────────────────────────────────
function getLastWeekData(exName){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-7);
  for(const w of getWorkouts()){
    if(new Date(w.date)>cutoff) continue;
    const ex=(w.exercises||[]).find(e=>e.name===exName);
    if(ex&&ex.sets&&ex.sets.length){
      const best=ex.sets.reduce((b,s)=>toDefault(s.weight,s.unit||w.unit||S.unit)>toDefault(b.weight,b.unit||w.unit||S.unit)?s:b,ex.sets[0]);
      return {weight:best.weight,reps:best.reps,unit:best.unit||w.unit||S.unit};
    }
  }
  return null;
}
function getPR(exName){
  let best=null;
  getWorkouts().forEach(w=>(w.exercises||[]).filter(e=>e.name===exName).forEach(ex=>(ex.sets||[]).forEach(s=>{
    const wt=toDefault(s.weight,s.unit||w.unit||S.unit);
    if(wt>0&&(!best||wt>best)) best=wt;
  })));
  return best;
}

// ── WEEK STRIP ────────────────────────────────────────────────────────
function renderWeekStrip(){
  const today=new Date(),d=today.getDay(),wks=getWorkouts();
  const names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html='';
  for(let i=0;i<7;i++){
    const dt=new Date(today); dt.setDate(today.getDate()-d+i);
    const isToday=i===d, hasSplit=!!SPLIT[i];
    const hasLog=wks.some(w=>new Date(w.date).toDateString()===dt.toDateString());
    let cls='day-pill'+(isToday?' today':hasSplit?' has-workout':' rest');
    html+=`<div class="${cls}">
      <div class="dp-name">${names[i]}</div>
      <div class="dp-num">${dt.getDate()}</div>
      ${hasLog?'<div class="dp-dot"></div>':'<div style="height:5px"></div>'}
    </div>`;
  }
  document.getElementById('week-strip').innerHTML=html;
}

// ── TODAY ─────────────────────────────────────────────────────────────
function renderToday(){
  renderWeekStrip();
  const d=dow(), split=SPLIT[d], body=document.getElementById('today-body');
  if(!split){
    let next=null,nextName='';
    for(let i=1;i<=7;i++){const nd=(d+i)%7;if(SPLIT[nd]){next=SPLIT[nd];nextName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][nd];break;}}
    body.innerHTML=`<div class="rest-hero"><div class="rest-icon">💤</div>
      <div class="rest-title">Rest Day</div><div class="rest-sub">Recovery is training.</div></div>
      ${next?`<div class="next-card"><div class="next-lbl">Up Next</div>
      <div class="next-day">${nextName}</div><div class="next-focus">${next.focus}</div></div>`:''}`;
    return;
  }
  if(!S.todayExs.length){
    S.todayExs=[...split.exercises]; S.todaySets={}; S.exUnits={};
    S.todayExs.forEach(ex=>{ S.todaySets[ex]=[{weight:'',reps:'',done:false,unit:S.unit}]; S.exUnits[ex]=S.unit; });
  }
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let html=`<div class="day-label-sm">${days[d]}</div>
    <div class="workout-title">${split.focus.split('—')[0].trim()}</div>
    <div class="workout-focus">${split.focus}</div>`;
  S.todayExs.forEach((ex,ei)=>{ html+=buildExCard(ex,ei); });
  html+=`<button class="btn-ghost" onclick="App.openAFB()" style="margin-bottom:8px;">+ Add Exercise</button>
    <button class="btn-primary" onclick="App.logWorkout()">Log Workout</button>`;
  body.innerHTML=html;
}

function buildExCard(exName,ei){
  const unit=S.exUnits[exName]||S.unit;
  const sets=S.todaySets[exName]||[{weight:'',reps:'',done:false,unit}];
  const muscle=getMuscleForEx(exName);
  const lw=getLastWeekData(exName); const pr=getPR(exName);
  let prevHTML='';
  if(lw) prevHTML+=`Last week: <span class="lw">${toDefault(lw.weight,lw.unit).toFixed(1)} ${S.unit} × ${lw.reps}</span>&nbsp; `;
  if(pr) prevHTML+=`PR: <span class="pr">${pr.toFixed(1)} ${S.unit}</span>`;
  const setsHTML=sets.map((s,si)=>buildSetRow(ei,si,s,unit)).join('');
  return `<div class="ex-card" id="exc-${ei}">
    <div class="ex-card-hd">
      <div class="ex-card-hd-l">
        <div class="ex-name">${exName}</div>
        ${muscle?`<div class="ex-muscle-tag">${muscle}</div>`:''}
      </div>
      <div class="ex-card-hd-r">
        <div class="ex-unit-tog">
          <div class="eu-opt${unit==='lbs'?' active':''}" onclick="App.setExUnit(${ei},'lbs')">lbs</div>
          <div class="eu-opt${unit==='kg'?' active':''}" onclick="App.setExUnit(${ei},'kg')">kg</div>
        </div>
        <button class="swap-btn" onclick="App.openSwap(${ei})" title="Swap exercise">
          <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
      </div>
    </div>
    ${prevHTML?`<div class="ex-prev">${prevHTML}</div>`:''}
    <div class="sets-hd"><span>Set</span><span id="shd-${ei}">${unit}</span><span>Reps</span><span>Done</span><span></span></div>
    <div id="sets-${ei}">${setsHTML}</div>
    <div class="add-set-wrap"><button class="add-set-btn" onclick="App.addSet(${ei})">+ Add Set</button></div>
  </div>`;
}

function buildSetRow(ei,si,s,unit){
  return `<div class="set-row${s.done?' done-row':''}" id="sr-${ei}-${si}">
    <div class="set-num">${si+1}</div>
    <input class="set-inp" type="number" placeholder="—" value="${s.weight}" min="0" step="${unit==='kg'?'2.5':'5'}"
      onchange="App.updSet(${ei},${si},'weight',this.value)"/>
    <input class="set-inp" type="number" placeholder="—" value="${s.reps}" min="1"
      onchange="App.updSet(${ei},${si},'reps',this.value)"/>
    <button class="chk-btn${s.done?' done':''}" onclick="App.toggleDone(${ei},${si})">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <button class="del-set-btn" onclick="App.delSet(${ei},${si})">×</button>
  </div>`;
}

function setExUnit(ei,toUnit){
  const ex=S.todayExs[ei], from=S.exUnits[ex]||S.unit;
  if(from===toUnit) return;
  S.exUnits[ex]=toUnit;
  (S.todaySets[ex]||[]).forEach(s=>{ if(s.weight!=='') s.weight=convert(s.weight,from,toUnit); s.unit=toUnit; });
  const card=document.getElementById('exc-'+ei);
  if(card){ const t=document.createElement('div');t.innerHTML=buildExCard(ex,ei);card.replaceWith(t.firstChild); }
}

function updSet(ei,si,field,val){ const ex=S.todayExs[ei];if(S.todaySets[ex])S.todaySets[ex][si][field]=val; }

function toggleDone(ei,si){
  const ex=S.todayExs[ei],sets=S.todaySets[ex];
  sets[si].done=!sets[si].done;
  if(sets[si].done&&si===sets.length-1)
    sets.push({weight:sets[si].weight,reps:sets[si].reps,done:false,unit:S.exUnits[ex]||S.unit});
  refreshSets(ei);
}
function addSet(ei){
  const ex=S.todayExs[ei],sets=S.todaySets[ex],prev=sets[sets.length-1]||{weight:'',reps:''};
  sets.push({weight:prev.weight,reps:prev.reps,done:false,unit:S.exUnits[ex]||S.unit});
  refreshSets(ei);
}
function delSet(ei,si){
  const ex=S.todayExs[ei],sets=S.todaySets[ex];
  if(sets.length<=1) return; sets.splice(si,1); refreshSets(ei);
}
function refreshSets(ei){
  const ex=S.todayExs[ei],unit=S.exUnits[ex]||S.unit;
  const c=document.getElementById('sets-'+ei);
  if(c) c.innerHTML=(S.todaySets[ex]||[]).map((s,si)=>buildSetRow(ei,si,s,unit)).join('');
  const hd=document.getElementById('shd-'+ei); if(hd) hd.textContent=unit;
}

// ── SWAP ──────────────────────────────────────────────────────────────
function openSwap(ei){
  S._swapIdx=ei;
  const exName=S.todayExs[ei];
  const muscle=getMuscleForEx(exName);
  document.getElementById('swap-title').textContent='Swap: '+exName;
  document.getElementById('swap-search').value='';
  renderSwapList('');
  document.getElementById('ov-swap').classList.add('open');
}

function renderSwapList(q){
  const ei=S._swapIdx; if(ei<0) return;
  const exName=S.todayExs[ei];
  const muscle=getMuscleForEx(exName);
  const bank=getBank();
  const q2=q.toLowerCase();

  // Build list: same-muscle suggestions first (tagged), then rest of bank
  const suggestions=bank.filter(e=>e.muscle===muscle&&e.name!==exName);
  const others=bank.filter(e=>e.muscle!==muscle&&e.name!==exName);
  const combined=[
    ...suggestions.map(e=>({...e,isSug:true})),
    ...others.map(e=>({...e,isSug:false}))
  ].filter(e=>!q2||e.name.toLowerCase().includes(q2)||e.muscle.toLowerCase().includes(q2));

  const list=document.getElementById('swap-list');
  if(!combined.length){list.innerHTML='<div class="empty-state"><p>No exercises found.</p></div>';return;}
  list.innerHTML=combined.map(e=>`
    <div class="swap-item" onclick="App.doSwap(${JSON.stringify(e.name)})">
      <div>
        <div class="bi-name">${e.name}</div>
        <div class="bi-sub">${e.muscle}${e.similar?` · <span class="bi-sim">${e.similar}</span>`:''}</div>
      </div>
      <span class="swap-tag ${e.isSug?'swap-tag-sug':'swap-tag-bank'}">${e.isSug?'Suggested':'Bank'}</span>
    </div>`).join('');
}

function filterSwap(q){ renderSwapList(q); }

function doSwap(newName){
  const ei=S._swapIdx; if(ei<0) return;
  const oldName=S.todayExs[ei];
  S.todayExs[ei]=newName;
  // carry over sets
  S.todaySets[newName]=S.todaySets[oldName]||[{weight:'',reps:'',done:false,unit:S.exUnits[oldName]||S.unit}];
  S.exUnits[newName]=S.exUnits[oldName]||S.unit;
  delete S.todaySets[oldName]; delete S.exUnits[oldName];
  closeOv('ov-swap');
  const card=document.getElementById('exc-'+ei);
  if(card){ const t=document.createElement('div');t.innerHTML=buildExCard(newName,ei);card.replaceWith(t.firstChild); }
}

  list.innerHTML=f.map(e=>`<div class="afb-item" onclick="App.addFromBank(${JSON.stringify(e.name)})">

}
function addFromBank(name){
  if(!S.todayExs.includes(name)){
    S.todayExs.push(name); S.todaySets[name]=[{weight:'',reps:'',done:false,unit:S.unit}]; S.exUnits[name]=S.unit;
  }
  closeOv('ov-afb'); renderToday();
}

// ── LOG WORKOUT ───────────────────────────────────────────────────────
function logWorkout(){
  const d=dow(),split=SPLIT[d];if(!split)return;
  const exercises=S.todayExs.map(exName=>({
    name:exName,
    sets:(S.todaySets[exName]||[]).filter(s=>s.weight||s.reps).map(s=>({weight:s.weight,reps:s.reps,done:s.done,unit:s.unit||S.exUnits[exName]||S.unit}))
  })).filter(e=>e.sets.length>0);
  const totalVol=exercises.reduce((sum,e)=>sum+e.sets.reduce((s2,s)=>s2+toDefault(s.weight,s.unit)*(parseFloat(s.reps)||0),0),0);
  const wks=getWorkouts();
  wks.unshift({date:new Date().toISOString(),day:split.name,focus:split.focus,tag:split.tag,unit:S.unit,exercises,totalVolume:Math.round(totalVol),totalSets:exercises.reduce((s,e)=>s+e.sets.length,0)});
  saveWorkouts(wks); S.todayExs=[];S.todaySets={};S.exUnits={};
  const btn=document.querySelector('.btn-primary');
  if(btn){btn.textContent='✓ Logged!';btn.style.background='var(--green)';btn.style.color='#fff';setTimeout(()=>renderToday(),1800);}
  else renderToday();
  renderWeekStrip();
}

function swipeStart(e,i){S._swipe[i]={startX:e.touches[0].clientX,dx:0};document.getElementById('he-'+i).classList.add('swiping');}
function swipeMove(e,i){if(!S._swipe[i])return;const dx=e.touches[0].clientX-S._swipe[i].startX;S._swipe[i].dx=dx;if(dx<0)document.getElementById('he-'+i).style.transform=`translateX(${Math.max(dx,-90)}px)`;}
function swipeEnd(e,i){
  if(!S._swipe[i])return;
  const el=document.getElementById('he-'+i);el.classList.remove('swiping');
  if(S._swipe[i].dx<-60){
    el.style.transform='translateX(-90px)';
    const bg=document.querySelector('#hw-'+i+' .del-bg');
    if(bg) bg.onclick=()=>deleteWorkout(i);
  } else { el.style.transform=''; }
  delete S._swipe[i];
}
function deleteWorkout(i){const wks=getWorkouts();wks.splice(i,1);saveWorkouts(wks);renderHistory();renderWeekStrip();}

function showDetail(i){
  const w=getWorkouts()[i];if(!w)return;
  document.getElementById('detail-title').textContent=w.day+' — '+fmtDate(w.date);

    :w.exercises.map(e=>`<div class="detail-ex">

        <div class="dg-hd">Set</div><div class="dg-hd">Weight</div><div class="dg-hd">Reps</div>
        ${e.sets.map((s,si)=>`<div class="dg-cell">${si+1}</div><div class="dg-cell hi">${s.weight||'—'} ${s.unit||w.unit||S.unit}</div><div class="dg-cell">${s.reps||'—'}</div>`).join('')}
      </div></div>`).join('');
  const db=document.getElementById('detail-del-btn');
  db.onclick=()=>{closeOv('ov-detail');setTimeout(()=>deleteWorkout(i),200);};
  document.getElementById('ov-detail').classList.add('open');
}

// ── PROGRESS ──────────────────────────────────────────────────────────
function getWeekWks(off=0){
  const start=weekStart(off),end=new Date(start);end.setDate(end.getDate()+7);
  return getWorkouts().filter(w=>{const d=new Date(w.date);return d>=start&&d<end;});
}
function avgWt(wkList){
  let sum=0,count=0;
  wkList.forEach(w=>(w.exercises||[]).forEach(e=>(e.sets||[]).forEach(s=>{
    const v=toDefault(s.weight,s.unit||w.unit||S.unit);if(v>0){sum+=v;count++;}
  })));
  return count?+(sum/count).toFixed(1):0;
}
function diffBadge(cur,prev){
  if(!prev||prev===0) return `<span class="diff-badge diff-flat">—</span>`;
  const pct=Math.round(((cur-prev)/prev)*100);
  const cls=pct>0?'diff-up':pct<0?'diff-dn':'diff-flat';
  return `<span class="diff-badge ${cls}">${pct>0?'+':''}${pct}%</span>`;
}

function renderProgress(){

  const totalVol=allWks.reduce((s,w)=>s+(w.totalVolume||0),0);

  const thisWkCount=allWks.filter(w=>new Date(w.date)>weekAgo).length;

  // per-tag volume breakdown
  const tags=['chest','back','legs'];
  const tagNames={chest:'Chest / Push',back:'Back / Pull',legs:'Legs'};
  const volByTag={};
  tags.forEach(t=>{
    volByTag[t]={vol:allWks.filter(w=>w.tag===t).reduce((s,w)=>s+(w.totalVolume||0),0),
      sets:allWks.filter(w=>w.tag===t).reduce((s,w)=>s+(w.totalSets||0),0)};
  });

  // week deltas
  const vThis=thisWk.reduce((s,w)=>s+(w.totalVolume||0),0);
  const vLast=lastWk.reduce((s,w)=>s+(w.totalVolume||0),0);
  const stThis=thisWk.reduce((s,w)=>s+(w.totalSets||0),0);
  const stLast=lastWk.reduce((s,w)=>s+(w.totalSets||0),0);
  const wThis=avgWt(thisWk),wLast=avgWt(lastWk);

  // PR data (pre-build for filtering)
  const exNames=[...new Set(allWks.flatMap(w=>(w.exercises||[]).map(e=>e.name)))];
  const allPRs=exNames.map(name=>{
    let best=null;
    // find which day this exercise belongs to
    let day='Unknown';
    for(const [dow2,sp] of Object.entries(SPLIT)){
      if(sp.exercises.includes(name)){day=sp.name;break;}
    }
    allWks.forEach(w=>(w.exercises||[]).filter(e=>e.name===name).forEach(ex=>(ex.sets||[]).forEach(s=>{
      const wt=toDefault(s.weight,s.unit||w.unit||S.unit);if(wt>0&&(!best||wt>best))best=wt;
    })));
    return best?{name,best,muscle:getMuscleForEx(name),day}:null;
  }).filter(Boolean).sort((a,b)=>b.best-a.best);

  const exOptions=exNames.map(e=>`<option value="${e}">${e}</option>`).join('');

  document.getElementById('progress-body').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-v">${allWks.length}</div><div class="stat-l">Workouts</div></div>
      <div class="stat-card"><div class="stat-v">${thisWkCount}</div><div class="stat-l">This Week</div></div>
      <div class="stat-card"><div class="stat-v">${fmtVol(totalVol)}</div><div class="stat-l">Total Vol (${S.unit})</div></div>
      <div class="stat-card"><div class="stat-v">${totalSets}</div><div class="stat-l">Total Sets</div></div>
    </div>

    <div class="section-hd" style="padding-top:14px;">Volume Breakdown</div>
    <div class="vol-breakdown" style="margin:0 16px;">
      <div class="vb-row" style="background:var(--bg3);border-bottom:1px solid var(--border);">
        <div class="vb-label" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;">Muscle Group</div>
        <div class="vb-vals">
          <div class="vb-val"><div class="vb-sub">Vol (${S.unit})</div></div>
          <div class="vb-val"><div class="vb-sub">Sets</div></div>
        </div>
      </div>
      ${tags.map(t=>`<div class="vb-row">
        <div class="vb-label">${tagNames[t]}</div>
        <div class="vb-vals">
          <div class="vb-val"><div class="vb-num">${fmtVol(volByTag[t].vol)}</div></div>
          <div class="vb-val"><div class="vb-num">${volByTag[t].sets}</div></div>
        </div>
      </div>`).join('')}
    </div>

    <div class="delta-card" style="margin-top:12px;">
      <div class="delta-hd">This Week vs Last Week</div>
      <div class="delta-grid">
        <div class="delta-cell"><div class="delta-lbl">Volume (${S.unit})</div>
          <div class="delta-row"><div class="delta-cur">${fmtVol(vThis)}</div>${diffBadge(vThis,vLast)}</div></div>
        <div class="delta-cell"><div class="delta-lbl">Avg Weight (${S.unit})</div>
          <div class="delta-row"><div class="delta-cur">${wThis||'—'}</div>${diffBadge(wThis,wLast)}</div></div>
        <div class="delta-cell"><div class="delta-lbl">Sessions</div>
          <div class="delta-row"><div class="delta-cur">${thisWk.length}</div>${diffBadge(thisWk.length,lastWk.length)}</div></div>

      </div>
    </div>

      <h3>Week vs Week by Muscle Group</h3>
      <p>This week vs last week volume</p>

        <select class="ex-picker" id="str-pick" onchange="App.updateStrengthChart(this.value)">
          <option value="">Select exercise ▾</option>${exOptions}
        </select>

      </div>

    </div>

      <canvas id="bw-chart" height="160"></canvas></div>`:''}

  // store PRs for filtering
  S._allPRs = allPRs;
  S.prSearch=''; S.prDayFilter='All';
  renderPRDayChips();
  renderPRList();
  renderWoWChart(thisWk,lastWk);

}

  document.getElementById('pr-day-chips').innerHTML=days.map(d=>

}

function renderPRList(){

    const q=S.prSearch.toLowerCase();
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.muscle.toLowerCase().includes(q);
    return matchDay&&matchQ;

    <div class="pr-right"><div class="pr-val">${p.best.toFixed(1)}</div><div class="pr-sub">${S.unit}</div></div>

function renderWoWChart(thisWk,lastWk){
  const ctx=document.getElementById('wow-chart');if(!ctx)return;

  const volFor=(wkList,tag)=>wkList.filter(w=>w.tag===tag).reduce((s,w)=>s+(w.totalVolume||0),0);
  const isDark=S.theme==='dark';
  const tc=isDark?'#c8c8c8':'#444', gc=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  if(S.charts.wow) S.charts.wow.destroy();
  S.charts.wow=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[
      {label:'This Week',data:tags.map(t=>volFor(thisWk,t)),backgroundColor:['#60a5fa99','#fb923c99','#4ade8099'],borderColor:['#60a5fa','#fb923c','#4ade80'],borderWidth:2,borderRadius:6},
      {label:'Last Week',data:tags.map(t=>volFor(lastWk,t)),backgroundColor:['#60a5fa33','#fb923c33','#4ade8033'],borderColor:['#60a5fa','#fb923c','#4ade80'],borderWidth:1,borderRadius:6,borderDash:[4,4]}
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},
      scales:{x:{ticks:{color:tc,font:{size:11}},grid:{display:false}},y:{ticks:{color:tc,font:{size:11}},grid:{color:gc}}}}});
}

function updateStrengthChart(exName){
  if(!exName) return;
  const wks=getWorkouts(),pts=[];
  [...wks].reverse().forEach(w=>{
    const ex=(w.exercises||[]).find(e=>e.name===exName);
    if(ex&&ex.sets.length){
      const best=ex.sets.reduce((b,s)=>toDefault(s.weight,s.unit||w.unit||S.unit)>toDefault(b.weight,b.unit||w.unit||S.unit)?s:b,ex.sets[0]);
      if(best.weight) pts.push({x:fmtDate(w.date).split(',')[0],y:toDefault(best.weight,best.unit||w.unit||S.unit)});
    }
  });
  const ctx=document.getElementById('str-chart');if(!ctx)return;
  const isDark=S.theme==='dark';
  const ac=isDark?'#e8ff47':'#1d4ed8', tc=isDark?'#888':'#888', gc=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  if(S.charts.str) S.charts.str.destroy();
  S.charts.str=new Chart(ctx,{type:'line',
    data:{labels:pts.map(p=>p.x),datasets:[{data:pts.map(p=>p.y),borderColor:ac,backgroundColor:isDark?'rgba(232,255,71,.08)':'rgba(29,78,216,.08)',tension:.35,pointBackgroundColor:ac,pointRadius:4,fill:true,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}});
}

function renderBWChart(bw){
  const ctx=document.getElementById('bw-chart');if(!ctx)return;
  const sorted=bw.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const isDark=S.theme==='dark';
  const tc=isDark?'#888':'#888',gc=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  if(S.charts.bw) S.charts.bw.destroy();
  S.charts.bw=new Chart(ctx,{type:'line',
    data:{labels:sorted.map(b=>fmtDate(b.date).split(',')[0]),datasets:[{data:sorted.map(b=>b.weight),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.08)',tension:.35,pointBackgroundColor:'#60a5fa',pointRadius:4,fill:true,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}});
}

// ── BANK ──────────────────────────────────────────────────────────────
function renderBank(){
  const bank=getBank();
  const muscles=['All','Chest','Shoulders','Triceps','Back','Biceps','Legs','Glutes','Core','Calves','Full Body'];
  document.getElementById('bank-count').textContent=bank.length+' exercises';
  document.getElementById('filter-chips').innerHTML=muscles.map(m=>
    `<div class="chip${m===S.bankFilter?' active':''}" onclick="App.setBankFilter('${m}')">${m}</div>`).join('');
  filterBank(document.getElementById('bank-search')?.value||'');
}
function setBankFilter(m){ S.bankFilter=m; renderBank(); }
function filterBank(q){
  const bank=getBank();
  const f=bank.filter(e=>{
    const mM=S.bankFilter==='All'||e.muscle===S.bankFilter;
    const qM=!q||e.name.toLowerCase().includes(q.toLowerCase())||e.muscle.toLowerCase().includes(q.toLowerCase());
    return mM&&qM;
  });
  const list=document.getElementById('bank-list');
  if(!f.length){list.innerHTML='<div class="empty-state"><p>No exercises found.</p></div>';return;}
  const groups={};
  f.forEach(e=>{if(!groups[e.muscle])groups[e.muscle]=[];groups[e.muscle].push(e);});
  list.innerHTML=Object.entries(groups).map(([m,items])=>`
    <div class="bank-grp-lbl">${m}</div>
    <div class="bank-card">${items.map(e=>`<div class="bank-item">
      <div>
        <div class="bi-name">${e.name}</div>
        ${e.similar?`<div class="bi-sub">Similar: <span class="bi-sim">${e.similar}</span></div>`:''}
      </div></div>`).join('')}</div>`).join('');
}
function openAddEx(){ document.getElementById('ov-add-ex').classList.add('open'); }
function saveNewEx(){
  const name=document.getElementById('new-ex-name').value.trim();
  const muscle=document.getElementById('new-ex-muscle').value;
  const similar=document.getElementById('new-ex-similar').value.trim();

  closeOv('ov-add-ex');
  ['new-ex-name','new-ex-similar'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('new-ex-muscle').value='';
  renderBank();
}

function setUnit(u){ S.unit=u; localStorage.setItem('il_unit',u); renderSettings(); }
function logBW(){ const v=parseFloat(document.getElementById('bw-inp').value);if(!v)return;const bw=getBW();bw.unshift({date:new Date().toISOString(),weight:v,unit:S.unit});saveBW(bw);renderSettings(); }

// ── OVERLAYS ──────────────────────────────────────────────────────────
function closeOv(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');}));

// ── INIT ──────────────────────────────────────────────────────────────
applyTheme(); renderToday();

function exportBackup(){
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    workouts: getWorkouts(),
    bodyweight: getBW(),
    bank: getBank(),
    unit: S.unit,
    theme: S.theme
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = 'groundwork-backup-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.version || !data.workouts){
          alert('Invalid backup file. Please use a file exported from Groundwork.');
          return;
        }
        const confirm_msg = 'This will replace all your current data with the backup.\n\nWorkouts: ' + data.workouts.length + '\nExported: ' + new Date(data.exported).toLocaleDateString() + '\n\nContinue?';
        if(!window.confirm(confirm_msg)) return;
        saveWorkouts(data.workouts);
        if(data.bodyweight) saveBW(data.bodyweight);
        if(data.bank) saveBank(data.bank);
        if(data.unit){ S.unit = data.unit; localStorage.setItem('il_unit', data.unit); }
        if(data.theme){ S.theme = data.theme; localStorage.setItem('il_theme', data.theme); applyTheme(); }
        renderSettings();
        alert('Backup restored successfully! ' + data.workouts.length + ' workouts loaded.');
      } catch(err){
        alert('Failed to read backup file. Make sure it is a valid Groundwork JSON export.');
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

function deleteBW(i){
  const bw=getBW();
  bw.splice(i,1);
  saveBW(bw);
  renderSettings();
}

return {
  nav,toggleTheme,toggleThemeChk,setUnit,logBW,deleteBW,exportBackup,importBackup,
  renderToday,updSet,toggleDone,addSet,delSet,setExUnit,logWorkout,

  openSwap,filterSwap,doSwap,
  swipeStart,swipeMove,swipeEnd,deleteWorkout,showDetail,
  updateStrengthChart,filterPRs,setPRDay,
  renderBank,setBankFilter,filterBank,openAddEx,saveNewEx,
  closeOv
};
})();
